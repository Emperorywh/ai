# MVP 的 CI 只验证能够支持核心闭环的代码质量。
# 不调用真实模型，也不保留多 Provider、Reviewer 或旧协议契约测试。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: 类型、Lint、测试与构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
